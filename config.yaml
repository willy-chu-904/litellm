model_list:
  # --- 模型 1: gpt-oss:120b-cloud 集群設定 ---
  - model_name: "gpt-oss:120b-cloud"
    litellm_params:
      model: "ollama_chat/gpt-oss:120b-cloud"
      api_base: "http://10.0.0.12:11434"
  - model_name: "gpt-oss:120b-cloud"
    litellm_params:
      model: "ollama_chat/gpt-oss:120b-cloud"
      api_base: "http://10.0.0.202:11434"

  # --- 模型 2: qwen3.5:397b-cloud 集群設定 ---
  - model_name: "qwen3.5:397b-cloud"
    litellm_params:
      model: "ollama_chat/qwen3.5:397b-cloud"
      api_base: "http://10.0.0.12:11434"
  - model_name: "qwen3.5:397b-cloud"
    litellm_params:
      model: "ollama_chat/qwen3.5:397b-cloud"
      api_base: "http://10.0.0.202:11434"

general_settings:
  master_key: "sk-1234"
  database_url: "sqlite:///app/litellm_data/litellm.db"

litellm_settings:
  set_verbose: True
  # 可選：啟用內存快取（無需 Redis）
  cache: true
  cache_params:
    type: "local"        # 本地內存快取
    ttl: 300             # 5 分鐘過期

# 環境變數（在 .env 或 docker-compose 中設置）
environment_variables:
  DATABASE_URL: "sqlite:///app/litellm_data/litellm.db"
  LITELLM_MASTER_KEY: "sk-1234"
  LITELLM_UI_USERNAME: "admin"
  LITELLM_UI_PASSWORD: "admin123"
